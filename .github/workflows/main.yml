name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-unsigned-ipa:
    runs-on: macos-15

    env:
      PROJECT: Localight.xcodeproj
      SCHEME: Localight
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Verify scheme exists (and print list)
        shell: bash
        run: |
          set -euo pipefail
          echo "Project: $PROJECT"
          echo "Expected scheme: $SCHEME"
          echo "---- xcodebuild -list ----"
          xcodebuild -list -project "$PROJECT" 2>&1 | tee /tmp/xcodebuild_list.txt

          if ! grep -qE "^[[:space:]]*$SCHEME[[:space:]]*$" /tmp/xcodebuild_list.txt; then
            echo "ERROR: Scheme '$SCHEME' not found. Make sure it's shared in Xcode."
            exit 1
          fi

      - name: Build archive (no code signing)
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$PWD/build/${SCHEME}.xcarchive"
          mkdir -p "$PWD/build"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$PWD/build/${SCHEME}.xcarchive"
          APP_DIR="$ARCHIVE_PATH/Products/Applications"

          echo "Looking for .app in: $APP_DIR"
          APP_PATH=$(find "$APP_DIR" -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in archive. Build likely failed earlier."
            exit 1
          fi

          OUT_DIR="$PWD/dist"
          PAYLOAD_DIR="$OUT_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"

          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          IPA_NAME="${SCHEME}-unsigned.ipa"
          (cd "$OUT_DIR" && /usr/bin/zip -qry "../$IPA_NAME" Payload)

          echo "Created unsigned IPA: $PWD/$IPA_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Localight-unsigned-ipa
          path: "*.ipa"
          if-no-files-found: error
